<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">

                    <h2 class="article-title"><a href="#">JavaScript实现博客导航栏高亮效果</a></h2>

                    </div>

                    <a href="#" class="read-more">阅读全文</a>
                </div>

    <footer class="footer">
